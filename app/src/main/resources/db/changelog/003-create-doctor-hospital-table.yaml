databaseChangeLog:
  - changeSet:
      id: create-doctor-hospital
      author: bicky

      changes:
        - createTable:
            tableName: doctor_hospital
            columns:
              - column:
                  name: doctor_id
                  type: bigint
                  constraints:
                    nullable: false

              - column:
                  name: hospital_id
                  type: bigint
                  constraints:
                    nullable: false

        - addPrimaryKey:
            tableName: doctor_hospital
            columnNames: doctor_id, hospital_id
            constraintName: pk_doctor_hospital

        - addForeignKeyConstraint:
            baseTableName: doctor_hospital
            baseColumnNames: doctor_id
            referencedTableName: doctors
            referencedColumnNames: id
            constraintName: fk_doctor_hospital_doctor

        - addForeignKeyConstraint:
            baseTableName: doctor_hospital
            baseColumnNames: hospital_id
            referencedTableName: hospitals
            referencedColumnNames: id
            constraintName: fk_doctor_hospital_hospital