databaseChangeLog:
  - changeSet:
      id: 006-create-patient-case-table
      author: bicky
      changes:
        - createTable:
            tableName: patient_cases
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: patient_id
                  type: varchar(36)
                  constraints:
                    nullable: false
              - column:
                  name: hospital_id
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: patient_cases
            baseColumnNames: hospital_id
            referencedTableName: hospitals
            referencedColumnNames: id
            constraintName: fk_patient_case_hospital