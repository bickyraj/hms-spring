databaseChangeLog:
  - changeSet:
      id: 007-create-patient-case-document-table
      author: bicky
      changes:
        - createTable:
            tableName: patient_case_documents
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: patient_case_id
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: document_name
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: s3_key
                  type: varchar(1024)
                  constraints:
                    nullable: true
              - column:
                  name: s3_bucket
                  type: varchar(255)
                  constraints:
                    nullable: true
              - column:
                  name: content_type
                  type: varchar(255)
                  constraints:
                    nullable: true
              - column:
                  name: file_size_bytes
                  type: bigint
                  constraints:
                    nullable: true
              - column:
                  name: status
                  type: varchar(50)
                  defaultValue: PENDING
                  constraints:
                    nullable: false
              - column:
                  name: uploaded_by
                  type: varchar(36)
                  constraints:
                    nullable: true
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: patient_case_documents
            baseColumnNames: patient_case_id
            referencedTableName: patient_cases
            referencedColumnNames: id
            constraintName: fk_patient_case_document_patient_case